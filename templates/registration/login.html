{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm border-0 planner-card">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Welcome back</h1>
                <p class="text-secondary">Sign in to view your deadlines, study plan, and progress.</p>
                <form method="post" class="vstack gap-3">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary" type="submit">Log in</button>
                </form>
                <div class="mt-3 d-flex justify-content-between small">
                    <a href="{% url 'password_reset' %}">Forgot your password?</a>
                    <a href="{% url 'accounts:register' %}">Create account</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
