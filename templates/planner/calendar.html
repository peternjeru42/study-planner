{% extends "base.html" %}
{% block title %}Calendar{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="h3 mb-1">Calendar view</h1>
        <p class="text-secondary mb-0">Combined deadline and study-session timeline.</p>
    </div>
</div>
<div class="calendar-shell">
    <div id="planner-calendar"></div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const calendarEl = document.getElementById("planner-calendar");
if (calendarEl) {
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        events: "{% url 'planner:calendar-events' %}",
        height: 720,
    });
    calendar.render();
}
</script>
{% endblock %}
